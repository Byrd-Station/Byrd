# Procedural ship generation configs (compact format).
# Uses type: shipConfig with flat fields + inheritance.
# Defaults: Ellipse profile, FloorSteel, Plating, WallShuttle, ShuttleWindow bow,
#   bowTaper 0.45, sternTaper 0.2, noise 1.0, 4 thrusters/vents/scrubbers.

# ============================================================================
# ABSTRACT BASES
# ============================================================================

- type: shipConfig
  abstract: true
  id: BaseSmallShip
  halfLength: 6
  halfWidth: 3

- type: shipConfig
  abstract: true
  id: BaseMediumShip
  generator: AmeController
  generatorShielding: AmeShielding
  generatorFuel: AmeJar

- type: shipConfig
  abstract: true
  id: BaseLargeShip
  halfLength: 18
  halfWidth: 10
  generator: AmeController
  generatorShielding: AmeShielding
  generatorFuel: AmeJar

# ============================================================================
# SMALL SHIPS
# ============================================================================

- type: shipConfig
  parent: BaseSmallShip
  id: SmallShipFreighter
  bowTaper: 0.35
  sternTaper: 0.15
  edgeNoiseAmplitude: 0.8
  thrustersPerDirection: 5
  ventCount: 5
  bowAnchors: [ComputerRadar, ComputerPowerMonitoring, ComputerCargoOrders]
  portBowAnchors: [CrateMaterialSteel, WardrobeCargo]
  starboardBowAnchors: [CrateMaterialPlasteel, CrateFilledSpawner]
  midAnchors: [OreProcessor, ClosetTool]
  portSternAnchors: [SubstationBasic, SolarPanel]
  starboardSternAnchors: [VendingMachineEngivend]
  sternAnchors: [Autolathe]
