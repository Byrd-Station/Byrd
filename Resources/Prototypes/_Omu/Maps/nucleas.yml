- type: gameMap
  id: Nucleas
  mapName: 'Nucleas'
  mapPath: /Maps/_Omu/nucleas.yml
  minPlayers: 30
  maxPlayers: 60
  stations:
    Nucleas:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Nucleas Station {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: 'NU'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/_Omu/Shuttles/Evac_Nucleas.yml
        - type: StationCargoShuttle
          path: /Maps/_Omu/Shuttles/Cargo_Nucleas.yml
        - type: StationJobs
          availableJobs:
            #command
            Captain: [ 1, 1 ]
            NanotrasenRepresentative: [ 1, 1 ]
            BlueshieldOfficer: [ 1, 1 ]
            #service
            HeadOfPersonnel: [ 1, 1 ]
            AdministrativeAssistant: [ 1, 1 ] # Delta V
            Bartender: [ 2, 2 ]
            Botanist: [ 2, 3 ]
            Chef: [ 2, 2 ]
            Janitor: [ 2, 2 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            ServiceWorker: [ 2, 3 ]
            Detective: [ 1, 1 ]
            #engineering
            ChiefEngineer: [ 1, 1 ]
            AtmosphericTechnician: [ 2, 3 ]
            StationEngineer: [ 4, 5 ]
            TechnicalAssistant: [ 3, 3 ]
            #medical
            ChiefMedicalOfficer: [ 1, 1 ]
            Chemist: [ 2, 3 ]
            MedicalDoctor: [ 3, 4 ]
            MedicalIntern: [ 2, 2 ]
            Paramedic: [ 2, 3 ]
            Virologist: [ 1, 1 ] 
            #science
            ResearchDirector: [ 1, 1 ]
            Scientist: [ 4, 4 ]
            ResearchAssistant: [ 2, 2 ]
            Roboticist: [ 2, 2 ] 
            #security
            HeadOfSecurity: [ 1, 1 ]
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 6, 6 ]
            SecurityCadet: [ 3, 3 ]
            Lawyer: [ 1, 2 ]
            Brigmedic: [ 1, 1 ]
            SecuritySergeant: [ 1, 1 ]
            #supply
            Quartermaster: [ 1, 1 ]
            SalvageSpecialist: [ 3, 3 ]
            Courier: [ 2, 2 ] 
            CargoTechnician: [ 3, 3 ]
            #civilian
            Passenger: [ -1, -1 ]
            Clown: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            Reporter: [ 1, 1 ]
            RadioHost: [ 1, 1 ] 
            #silicon
            StationAi: [ 1, 1 ]
            Borg: [ 3, 3 ]

            NanotrasenCareerTrainer: [ 2, 2] 

