
# I'm putting anything that is a direct malus (debuff) in here. Feel free to either tag it as a physical trait or an actual disability.

- type: trait
  id: Redshirt
  name: trait-redshirt-name
  description: trait-redshirt-desc
  category: PhysicalTraits
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      100: Dead
  globalCost: -8
  requirements:
  - !type:SpeciesRequirement
    inverted: true
    species:
    - IPC
  - !type:TraitsRequirement
    traits:
    - GlassJaw
    - WillToDie
    - WillToLive
    inverted: true

