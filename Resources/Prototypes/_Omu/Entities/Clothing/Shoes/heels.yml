- type: entity
  parent: ClothingShoesBase
  id: ClothingShoesHeels
  name: heels
  description: A both professional and stylish pair of footwear that are slightly difficult to walk in.
  components:
  - type: Sprite
    sprite: _Omu/Clothing/Shoes/Heels/heels.rsi
  - type: Clothing
    sprite: _Omu/Clothing/Shoes/Heels/heels.rsi
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepHighHeels
      params:
        volume: -6
        variation: 0.09

- type: entity
  parent: [ClothingShoesHeels, BaseMajorContraband]
  id: ClothingShoesHeelsSyndie
  name: heels
  description: A both professional and stylish pair of footwear that are shockingly comfortable to walk in. They have have been sharpened to allow them to be used as a rudimentary weapon.
  components: # all that's really different is that this is similar to a combat knife.
  - type: ClothingSlowOnDamageModifier
    modifier: 0.5
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 2
    damage:
      types:
        Slash: 9
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 10
  - type: DisarmMalus
    malus: 0.225
  - type: ThrowingAngle
    angle: 225
  - type: ThrowableBlocked
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          radius: 0.01
          vertices:
          - -0.4,-0.2
          - -0.2,-0.4
          - 0.4,0.2
          - 0.2,0.4
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
