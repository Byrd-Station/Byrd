- type: entity
  parent: BaseItem
  id: ClothingHeadHatSpaceHelmetDragon
  name: dragon helmet
  description: The hood of the dragon suit. This time, sealed and spaceproof!
  components:
  - type: Sprite
    state: icon
    sprite: _Omu/Clothing/Head/Hardsuits/dragonhoodhelmet.rsi
  - type: Clothing
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
    quickEquip: false
    slots: [ HEAD ]
    sprite: _Omu/Clothing/Head/Hardsuits/dragonhoodhelmet.rsi
  - type: PressureProtection # copied from the hardsuit helm, all so that I can remove snout from the hide component so it shows through the transparent screen.
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.1
