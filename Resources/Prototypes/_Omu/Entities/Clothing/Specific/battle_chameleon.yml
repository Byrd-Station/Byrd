- type: entity
  parent: ClothingHandsChameleon
  id: BattleHandsChameleon
  suffix: Battle Chameleon
  components:
    - type: Insulated
    - type: Armor # same stats as combat gloves
      modifiers:
        coefficients:
          Blunt: 0.9
          Slash: 0.9
          Piercing: 0.9
          Shock: 0.75

- type: entity
  parent: ClothingOuterChameleon
  id: BattleOuterChameleon
  suffix: Battle Chameleon
  components: # stats roughly inbetween security vest and webvest
    - type: Armor
      traumaDeductions:
        Dismemberment: 0.3
        OrganDamage: 0.3
        BoneDamage: 0.3
        VeinsDamage: 0
        NerveDamage: 0
      coverage:
      - Chest
      - Groin
      modifiers:
        coefficients:
          Blunt: 0.65
          Slash: 0.6
          Piercing: 0.35
          Heat: 0.8
      showArmorOnExamine: true
    - type: ExplosionResistance
      damageCoefficient: 0.8
    - type: ModifyDelayedKnockdown
      delayDelta: 2.5
      knockdownTimeDelta: -2.5
    - type: StaminaResistance
      damageCoefficient: 0.6

- type: entity
  parent: ClothingHeadHatChameleon
  id: BattleHeadHatChameleon
  suffix: Battle Chameleon
  components:
    - type: Armor # Same stats as the sec helmet
      coverage:
        - Head
      traumaDeductions:
        Dismemberment: 0.3
        OrganDamage: 0.3
        BoneDamage: 0.3
        VeinsDamage: 0
        NerveDamage: 0
      modifiers:
        coefficients:
          Blunt: 0.7
          Slash: 0.7
          Piercing: 0.7
          Heat: 0.8
    - type: ExplosionResistance
      damageCoefficient: 0.75
    - type: FlashSoundSuppression
    - type: FaceHuggerBlocker

- type: entity
