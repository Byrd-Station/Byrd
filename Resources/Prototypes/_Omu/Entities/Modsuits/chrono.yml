# The Modsuit Itself, This is just a Deathsquad modsuit
- type: entity
  parent: [ ClothingModsuitStandard, BaseCentcommContraband ]
  id: ClothingModsuitLegionnaire
  name: Legionnaire modsuit control unit
  description: The main controller for a Legionnaire modsuit.
  components:
    - type: Sprite
      sprite: _Omu/Clothing/Modsuits/chrono.rsi
    - type: ToggleableClothing
      clothingPrototypes:
        head: ClothingModsuitHelmetLegionnaire
        gloves: ClothingModsuitGauntletsLegionnaire
        outerClothing: ClothingModsuitChestplateLegionnaire
        shoes: ClothingModsuitBootsLegionnaire
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: PowerCellAntiqueProto
          whitelist:
            components:
              - PowerCell
    - type: Storage
      grid:
        - 0,0,7,6
    - type: ExplosionResistance
      damageCoefficient: 0
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        back:
        - state: equipped-BACKPACK-sealed
    - type: BasicEntityAmmoProvider
      proto: BulletStasis
      capacity: 1
      count: 1
    - type: RechargeBasicEntityAmmo
      rechargeCooldown: 2.5
      rechargeSound:
        path: /Audio/_Goobstation/Weapons/ChronoLegionnaire/stasisgun_reload.ogg
    - type: Tag
      tags:
      - StasisBattery

- type: entity
  parent: ClothingModsuitGauntletsStandard
  id: ClothingModsuitGauntletsLegionnaire
  name: Legionnaire modsuit gauntlets
  description: A pair of gauntlets made for the Legionnaire modsuit.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _Omu/Clothing/Modsuits/chrono.rsi
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        gloves:
        - state: equipped-HAND-sealed
    - type: Insulated # Omu, Who removed the insulated from the parent...

- type: entity
  parent: [ClothingModsuitHelmetStandard, ClothingEyesHudOmni]
  id: ClothingModsuitHelmetLegionnaire
  name: Legionnaire modsuit helmet # Goob edit
  description: A state-of-the-art helmet designed by NanoTrasen for the Legionnaire modsuit. It includes a built-in HUD.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _Omu/Clothing/Modsuits/chrono.rsi
    - type: PressureProtection
      highPressureMultiplier: 0.08
      lowPressureMultiplier: 1000
    - type: Armor
      traumaDeductions: # prevents traumas at all (kinda)
        Dismemberment: 1
        OrganDamage: 1
        BoneDamage: 1
        VeinsDamage: 1
        NerveDamage: 1
      modifiers:
        coefficients:
          Blunt: 0.01 # Best armor in the game - Yeah no shit.
          Slash: 0.01
          Piercing: 0.01
          Heat: 0.01
          Cold: 0.01
          Shock: 0.01
          Cellular: 0.01
          Radiation: 0.01
          Caustic: 0.01
    - type: ThermalVision
      isEquipment: true
      color: "#EDFEFF"
      lightRadius: 15
    - type: FlashImmunity # Goobstation
    - type: FlashSoundSuppression # Goobstation
      protectionRange: 0
    - type: PointLight
      color: "#EDFEFF"
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        head:
        - state: equipped-HEAD-sealed
    - type: SpeechSoundsReplacer
      speechSounds: Chrono

- type: entity
  parent: ClothingModsuitChestplateStandard
  id: ClothingModsuitChestplateLegionnaire
  name: Legionnaire modsuit chestplate
  description: A state of the art chestplate designed by NanoTrasen for the Legionnaire Modsuit. It incorporates powered servos to reduce the equipment load.
  categories: [HideSpawnMenu]
  components:
    - type: Sprite
      sprite: _Omu/Clothing/Modsuits/chrono.rsi
    - type: ClothingSpeedModifier
      walkModifier: 1
      sprintModifier: 1
    - type: Armor
      traumaDeductions: # prevents traumas at all (kinda)
        Dismemberment: 1
        OrganDamage: 1
        BoneDamage: 1
        VeinsDamage: 1
        NerveDamage: 1
      modifiers:
        coefficients:
          Blunt: 0.01 # Best armor in the game - Yeah no shit.
          Slash: 0.01
          Piercing: 0.01
          Heat: 0.01
          Cold: 0.01
          Shock: 0.01
          Cellular: 0.01
          Radiation: 0.01
          Caustic: 0.01
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        outerClothing:
        - state: equipped-OUTERCLOTHING-sealed
    - type: StaminaResistance
      damageCoefficient: 0 # 100%
    - type: PressureProtection
      highPressureMultiplier: 0.02
      lowPressureMultiplier: 1000
    - type: ExplosionResistance
      damageCoefficient: 0
    - type: FireProtection
      reduction: 1
    - type: StasisProtection
    - type: StasisBlinkProvider
    - type: TemperatureProtection
      heatingCoefficient: 0.01
      coolingCoefficient: 0.01
    - type: ClothingSlowOnDamageModifier
      modifier: 0
    - type: ClothingModifyStunTime
      modifier: 0
    - type: ModifyStandingUpTime
      multiplier: 0
    - type: ModifyDelayedKnockdown
      cancel: true
    - type: ClothingGrantComponent
      component:
      - type: SupermatterImmune
      # tesla immunity too
      - type: EventHorizonIgnore
        horizonWhitelist:
          tags:
          - Tesla
      # can touch containment fields safely
      - type: ContainmentFieldIgnore

- type: entity
  parent: ClothingModsuitBootsStandard
  id: ClothingModsuitBootsLegionnaire
  name: Legionnaire modsuit boots
  description: A state-of-the-art pair of magboots for the Legionnaire modsuit. So long as the suit is powered, these will not slow the wearer down.
  categories: [HideSpawnMenu]
  components:
    - type: Appearance
    - type: Sprite
      sprite: _Omu/Clothing/Modsuits/chrono.rsi
    - type: SealableClothingVisuals
      spriteLayer: sealed
      clothingVisuals:
        shoes:
        - state: equipped-FEET-sealed
    - type: ItemToggle
    - type: ToggleClothing
      action: ActionToggleMagboots
    - type: ComponentToggler
      components:
      - type: NoSlip
    - type: Magboots
      enabledPrefix: null
    - type: ClothingSpeedModifier
      walkModifier: 1.1
      sprintModifier: 1.1
    - type: FootstepModifier
      footstepSoundCollection:
        collection: FootstepHeavySuit

- type: entity
  id: SuitStorageLegionnaire
  parent: SuitStorageBase
  suffix: Legionnaire Modsuit
  components:
    - type: StorageFill
      contents:
          - id: OxygenTankFilled
          - id: ClothingModsuitLegionnaire
          - id: ClothingMaskBreath

- type: entity
  parent: ClothingModsuitLegionnaire
  id: ClothingModsuitLegionnaireFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
      - id: StasisCage
        amount: 4
      - id: MedkitCombatStasiziumFilled
      - id: StasisBaton
      - id: RCDChrono
      - id: ChronoTeleporter
      - id: HandheldGPSBasic # Mass Scanner Removed by Lavaland
      - id: HyperFlash
      - id: TimelineDisruptorFlatpack
