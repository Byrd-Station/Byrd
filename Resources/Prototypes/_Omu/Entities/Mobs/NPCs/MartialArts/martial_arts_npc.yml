- type: entity
  id: BaseMobMartialArtist
  abstract: true
  parent: BaseMobHuman
  components:
    - type: RandomHumanoidAppearance
    - type: HTN
      rootTask:
        task: MartialArtsHostileCompound
    - type: NpcFactionMember
      factions:
        - SimpleHostile
    - type: Loadout
      prototypes:
        - MartialArtistGear

- type: entity
  id: MobHostileCQC
  name: CQC Expert
  description: A hostile combatant trained in Close Quarters Combat.
  parent: BaseMobMartialArtist
  components:
    - type: Loadout
      prototypes:
        - MartialArtistGearCQC
    - type: MartialArtsKnowledge
      martialArtsForm: CloseQuartersCombat
      originalFistDamage: 5
      originalFistDamageType: Blunt
    - type: CanPerformCombo
      roundstartCombos:
        - CQCKick
        - CQCSlam
        - CQCRestrain
        - CQCPressure
        - CQCConsecutive

