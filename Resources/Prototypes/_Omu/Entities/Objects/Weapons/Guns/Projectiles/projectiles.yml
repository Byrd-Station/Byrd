- type: entity
  parent: BaseBullet
  id: ParticleRadiation # yes I took most of this from anomalous particles, fight me.
  name: radiation particle
  categories: [ HideSpawnMenu ]
  components:
  - type: PointLight # copied this from omega particles but made it bigger and stronger because yes :3
    enabled: true
    color: "#38c24f"
    radius: 3.0
    energy: 10.0
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: magicm_green # yeah I know omega particles use this but like. Rad particles, and also used for sci anyway
      shader: unshaded
  - type: Ammo
    muzzleFlash: null
  - type: Physics
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        mask:
        - Opaque
      fly-by: *flybyfixture
  - type: Projectile
    damage:
      types:
        Radiation: 8
  - type: TimedDespawn
    lifetime: 3
  - type: Reflective
    reflective:
    - Energy
  - type: SmartLinkBlacklist # Goobstation
