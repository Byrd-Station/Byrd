- type: entity
  name: m1 garand
  parent: [BaseWeaponSniper, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponSniperM1Garand
  description: A beautiful weapon once wielded by infantry in Sol. *ping!*
  suffix: sergeant, ceremonial rifle
  components:
  - type: Clothing
    sprite: _Omu/Objects/Weapons/Guns/Snipers/ceremonial_rifle.rsi
  - type: Sprite
    sprite: _Omu/Objects/Weapons/Guns/Snipers/ceremonial_rifle.rsi
    state: base
  - type: Gun
    fireRate: 1 # Slighty higher fire rate (1, instead of 0.75)
    attackType: Heavy
  - type: ChamberMagazineAmmoProvider
    autoCycle: true
    autoEject: true
    soundAutoEject:
      path: /Audio/_Goobstation/Weapons/Guns/MagOut/garand_eject.ogg
  - type: GunRequiresWield
  - type: StaticPrice
    price: 500
  - type: Item  # Goob edit
    size: Large
    storedRotation: 45
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineClipM1Garand
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineClipM1Garand
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
          - BaseCartridgeLightRifle
