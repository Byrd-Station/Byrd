- type: entity
  id: WeaponSubMachineGunC20rCentComm
  parent: WeaponSubMachineGunC20r
  description: A classic and widespread submachine gun. One of the first homegrown Waffle Corp. designs, it remains in service today. Feeds from .35 SMG magazines. A Nanotrasen Logo is stamped on the frame.
  suffix: CentComm
  components:
    - type: Contraband
      allowedDepartments: [ CentralCommand ]
      severity: Restricted

- type: entity
  name: placeholder custodii smg name
  parent: [BaseWeaponSubMachineGun, BaseGunWieldable]
  id: WeaponSubMachineGunCustodii
  description: Command, Compliance, Correction. It's not a sin if you're standing two steps behind a god.
  components:
  - type: Contraband
    allowedDepartments: [ CentralCommand ]
    severity: Restricted
  - type: Sprite
    sprite: _Omu/Objects/Weapons/Guns/SMGs/tungstensmg.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Omu/Objects/Weapons/Guns/SMGs/tungstensmg.rsi
  - type: Wieldable
  - type: GunWieldBonus
    minAngle: -15
    maxAngle: -24
  - type: Gun
    minAngle: 18
    maxAngle: 30
    fireRate: 5
    cameraRecoilScalar: 2
    soundGunshot:
      path: /Audio/_EinsteinEngines/Weapons/Guns/Gunshots/fpa-90-suppressed-gunshot.ogg
      params:
        volume: -3
        maxDistance: 8
    availableModes:
    - SemiAuto
    - FullAuto
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 10000
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineCaselessRifle
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineCaselessRifle
      gun_chamber:
        name: Chamber
        startingItem: CartridgeCaselessRifle
        priority: 1
        whitelist:
          tags:
            - CartridgeCaselessRifle
