- type: entity
  parent: BaseItem
  id: SprayPainterExperimental
  name: experimental spray painter
  description: A modified Spray Painter that can tap into a pocket of Bluespace, and will not require charges.
  components: # literally just the base spray painter without the charges
  - type: Sprite
    sprite: _Omu/Objects/Tools/experimental_spray_painter.rsi
    state: experimental_spray_painter
  - type: Item
    sprite: _Omu/Objects/Tools/experimental_spray_painter.rsi
  - type: ActivatableUI
    key: enum.SprayPainterUiKey.Key
  - type: UserInterface
    interfaces:
      enum.SprayPainterUiKey.Key:
        type: SprayPainterBoundUserInterface
  - type: SprayPainter
    colorPalette:
      red: '#FF1212FF'
      yellow: '#B3A234FF'
      brown: '#947507FF'
      green: '#3AB334FF'
      cyan: '#03FCD3FF'
      blue: '#0335FCFF'
      white: '#FFFFFFFF'
      black: '#333333FF'
      # standard atmos pipes
      waste: '#990000'
      distro: '#0055cc'
      air: '#03fcd3'
      mix: '#947507'
  - type: StaticPrice
    price: 40
  - type: Tool
    qualities:
    - Painting
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
