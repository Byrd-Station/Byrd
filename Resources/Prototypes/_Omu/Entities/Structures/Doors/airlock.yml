#Courier Airlock
- type: entity
  parent: AirlockCargo
  id: AirlockCourier
  suffix: Courier
  components:
  - type: Sprite
    sprite: Structures/Doors/Airlocks/Standard/cargo.rsi
  - type: Wires
    layoutId: AirlockCargo

- type: entity
  parent: AirlockCourier
  id: AirlockCourierLocked
  suffix: Courier, Locked
  components:
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsCourier ]

#Courier Glass Airlock
- type: entity
  parent: AirlockGlass
  id: AirlockCourierGlass
  suffix: Courier
  components:
  - type: Sprite
    sprite: Structures/Doors/Airlocks/Glass/cargo.rsi
  - type: Wires
    layoutId: AirlockCargo

- type: entity
  parent: AirlockCourierGlass
  id: AirlockCourierGlassLocked
  suffix: Courier, Locked
  components:
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsCourier ]
