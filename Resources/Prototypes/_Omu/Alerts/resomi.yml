- type: alertCategory
  id: ResomiEnergy

# Resomi Energy bar — drains over time, recharges while nesting.
# Severity 1 = high, 2 = medium, 3 = low, 4 = critical/exhausted.
- type: alert
  id: ResomiEnergy
  category: ResomiEnergy
  name: alert-resomi-energy-name
  description: alert-resomi-energy-desc
  minSeverity: 1
  maxSeverity: 4
  icons:
  - sprite: /Textures/_Omu/Interface/Alerts/resomi_energy.rsi
    state: high
  - sprite: /Textures/_Omu/Interface/Alerts/resomi_energy.rsi
    state: medium
  - sprite: /Textures/_Omu/Interface/Alerts/resomi_energy.rsi
    state: low
  - sprite: /Textures/_Omu/Interface/Alerts/resomi_energy.rsi
    state: critical
