# omu event director configuration — secret structured preset
# weights are taken directly from the design doc percentages (e.g. 0.50 = 50%).
# the system normalizes weights automatically so they don't need to sum to 1.
# to rebalance, just change the weights here — no c# changes needed.
#
# entries marked "# TODO: not in omustation yet" need their game rule added before enabling.

- type: eventDirectorConfig
  id: OmuDefault

  roundStartTable: OmuRoundStartDirectorTable
  minorTable: OmuMinorDirectorTable
  midroundTable: OmuMidroundDirectorTable
  timerTable: OmuTimerDirectorTable

  # loop delay: after each (timer roll + minor roll), wait this long before the next iteration.
  # minor also fires immediately at roundstart before the first loop begins.
  minorDelayMinMinutes: 5
  minorDelayMaxMinutes: 20

  # midround fires once independently at a random time in this window
  firstMidroundRollMinMinutes: 40
  firstMidroundRollMaxMinutes: 80


# --- table 1: roundstart antags ---
# weights from design doc. entries without a valid rule in omustation are commented out.
# total eligible weight with all entries: ~87 (missing conspirators/shadowling/xenos = ~13)
- type: eventDirectorTable
  id: OmuRoundStartDirectorTable
  entries:

  # 50%  bread and butter, works at any population (lol)
  - id: traitor
    name: Traitor
    rule: Traitor
    weight: 50
    minimumPlayers: 5
    maximumOccurrences: 1

  # 10% — slow burn, rewards attentive crews
  - id: heretic
    name: Heretic
    rule: Heretic
    weight: 10
    minimumPlayers: 20
    maximumOccurrences: 1

  # 10% — social deduction antag, needs a decent crew to work
  - id: changeling
    name: Changeling
    rule: Changeling
    weight: 10
    minimumPlayers: 20
    maximumOccurrences: 1

  # 8% — TODO: not in omustation yet, uncomment when conspirators rule is added with permissions, add it if you guys want.
  # - id: conspirators
  #   name: Conspirators
  #   rule: Conspirators
  #   weight: 8
  #   minimumPlayers: 30
  #   maximumOccurrences: 1

  # 5% — high pressure, only fires at decent pop
  - id: nukeops
    name: Nuclear Operatives
    rule: Nukeops
    weight: 5
    minimumPlayers: 30
    maximumOccurrences: 1

  # 5% — TODO: not in omustation yet, uncomment when shadowling rule is added
  # - id: shadowling
  #   name: Shadowling
  #   rule: Shadowling
  #   weight: 5
  #   minimumPlayers: 20
  #   maximumOccurrences: 1

  # 4% — high impact cult antag, needs good pop
  - id: cosmic-cult
    name: Cosmic Cult
    rule: CosmicCult
    weight: 4
    minimumPlayers: 30
    maximumOccurrences: 1

  # 3% — chaotic magic antag
  - id: wizard
    name: Wizard
    rule: Wizard
    weight: 3
    minimumPlayers: 20
    maximumOccurrences: 1

  # 3% — TODO: not in omustation yet, uncomment when xenos rule is added
  # - id: xenos
  #   name: Xenos
  #   rule: XenosSpawn
  #   weight: 3
  #   minimumPlayers: 30
  #   maximumOccurrences: 1

  # 2% — TODO: not in omustation yet, uncomment when chimera game rule entity is added
  # - id: chimera
  #   name: Chimera
  #   rule: Chimera
  #   weight: 2
  #   minimumPlayers: 30
  #   maximumOccurrences: 1


# --- table 2: minor antags ---
# rolled every 5-20 minutes. thief dominates at 65% by design — it's the safest minor antag.
# weights from design doc. maintslasher is listed at 0% so it's commented out for now.
- type: eventDirectorTable
  id: OmuMinorDirectorTable
  entries:

  # 65% — safest and most rp-friendly minor antag
  - id: thief
    name: Thief
    rule: Thief
    weight: 65
    minimumPlayers: 0
    repeatDelayMinutes: 30

  # 3% — chaotic contract antag, needs enough people to target
  - id: devil
    name: Devil
    rule: Devil
    weight: 3
    minimumPlayers: 25
    repeatDelayMinutes: 40

  # 3% — abductor lite, works at low pop
  - id: lone-abductor
    name: Lone Abductor
    rule: TokenLoneAbductorSpawn
    weight: 3
    minimumPlayers: 10
    repeatDelayMinutes: 40

  # 3% — chaotic clown antag
  - id: tunnel-clown
    name: Tunnel Clown
    rule: TunnelClownMidround
    weight: 3
    minimumPlayers: 15
    repeatDelayMinutes: 45

  # 3% — mercenary antag, needs targets
  - id: contractor
    name: Contractor
    rule: ContractorSpawn
    weight: 3
    minimumPlayers: 30
    repeatDelayMinutes: 40

  # 3% — chaotic critter antag
  - id: floor-goblin
    name: Floor Goblin
    rule: FloorGoblinSpawn
    weight: 3
    minimumPlayers: 10
    repeatDelayMinutes: 40

  # 3% — rat king migration, creates emergent chaos
  - id: ratking
    name: Rat King
    rule: KingRatMigration
    weight: 3
    minimumPlayers: 25
    repeatDelayMinutes: 45

  # 0% — disabled by design doc, uncomment when ready to enable
  # - id: maint-slasher
  #   name: Maintenance Slasher
  #   rule: SlasherSpawn
  #   weight: 0
  #   minimumPlayers: 40
