# --- table 4: timer / background events ---
# fires every 10-30 minutes independently of antag rolls.
# these are environmental events that give departments something to react to.
- type: eventDirectorTable
  id: OmuTimerDirectorTable
  entries:

  # bluespace locker — low stakes item surprise
  - id: bluespace-locker
    name: Bluespace Locker
    rule: BluespaceLocker
    weight: 5
    minimumPlayers: 10
    repeatDelayMinutes: 20

  # clerical error — paperwork chaos
  - id: clerical-error
    name: Clerical Error
    rule: ClericalError
    weight: 5
    minimumPlayers: 15
    repeatDelayMinutes: 20

  # breaker flip — localized power outage, engineering gets a task
  - id: breaker-flip
    name: Breaker Flip
    rule: BreakerFlip
    weight: 4
    minimumPlayers: 10
    repeatDelayMinutes: 15

  # power grid check — broader power event
  - id: power-grid-check
    name: Power Grid Check
    rule: PowerGridCheck
    weight: 4
    minimumPlayers: 15
    repeatDelayMinutes: 20

  # vent clog — atmos gets a job
