# omu event director — TEST CONFIG
# DO NOT use on production. this file exists only for solo local testing.
# all minimumPlayers values are set to 0 so every event can fire with 1 player.
# also uses shorter loop delays (1-3 min) so you don't have to wait 5-20 min per cycle.
#
# to activate: set event_director.config = "OmuTest" in server_config_local.toml
# to deactivate: remove that line or change it back to "OmuDefault"

- type: eventDirectorConfig
  id: OmuTest

  roundStartTable: OmuTestRoundStartTable
  minorTable: OmuTestMinorTable
  midroundTable: OmuTestMidroundTable
  timerTable: OmuTestTimerTable

  # short loop delay so you can see the cycle fire quickly during a solo test session
  minorDelayMinMinutes: 1
  minorDelayMaxMinutes: 3

  # midround fires early so you don't have to wait 40+ minutes
  firstMidroundRollMinMinutes: 5
  firstMidroundRollMaxMinutes: 10


# --- test table 1: roundstart ---
# same weights as production, minimumPlayers forced to 0
- type: eventDirectorTable
  id: OmuTestRoundStartTable
