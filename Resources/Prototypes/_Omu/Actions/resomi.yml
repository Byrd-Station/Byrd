# Resomi species actions

- type: entity
  id: ActionResomiEnterNest
  name: Curl into nest
  description: Curl up and rest. You become immobile but slowly heal and feel at ease. You can still chirp from the nest.
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: _Omu/Interface/Actions/actions_resomi.rsi
      state: nest
  - type: InstantAction
    event: !type:EnterNestActionEvent

- type: entity
  id: ActionResomiExitNest
  name: Get up from nest
  description: Get up and resume normal activity.
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: _Omu/Interface/Actions/actions_resomi.rsi
      state: unnest
  - type: InstantAction
    event: !type:ExitNestActionEvent

- type: entity
  id: ActionResomiToggleSprint
  name: Sprint
  description: Channel your raptor instincts and sprint at high speed. Drains stamina. If you run out you will be left completely exhausted.
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: _Omu/Interface/Actions/actions_resomi.rsi
      state: sprint
  - type: InstantAction
    event: !type:ToggleSprintActionEvent

- type: entity
  id: ActionResomiCall
  name: Call
  description: Let out a piercing raptor call. Other Resomis on the station will hear it and know which direction it came from.
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: _Omu/Interface/Actions/actions_resomi.rsi
      state: bird_call
  - type: InstantAction
    event: !type:ResomiCallActionEvent
