- type: reagent
  id: Cocaine
  name: reagent-name-cocaine
  group: Narcotics
  desc: reagent-desc-cocaine
  physicalDesc: reagent-physical-desc-translucent
  flavor: bitter
  color: "#c2c2c2"
  boilingPoint: 150.0
  meltingPoint: -10.0
  metabolisms:
    Narcotic:
      metabolismRate: 0.25 # Goobstation edit
      effects:
      - !type:PopupMessage
        type: Local
        visualType: MediumCaution
        messages:
        - cocaine-effect
        probability: 0.1
      - !type:PopupMessage
        conditions:
        - !type:ReagentThreshold
          min: 30
        type: Local
        visualType: LargeCaution
        messages:
        - cocaine-overdose-heartpounding
        - cocaine-overdose-chestpain
        - cocaine-overdose-cantbreathe
        probability: 0.2
      - !type:ModifyStatusEffect
        effectProto: StatusEffectEnraged
        time: 2.5
        refresh: true
        type: Add
      - !type:Polymorph
        prototype: CocaineSpaceBear
        conditions:
        - !type:ReagentThreshold
          min: 80
      - !type:HealthChange
        conditions:
        - !type:OrganType # Goobstation - Yowie
          type: Yowie
        damage:
          groups:
            Brute: -1
          types:
            Heat: -0.5
            Shock: -0.5
            Cold: -0.5
            Radiation: -0.5
      - !type:MovespeedModifier
        walkSpeedModifier: 1.3
        sprintSpeedModifier: 1.3
      - !type:HealthChange
        conditions:
        - !type:OrganType
          type: Yowie
          shouldHave: false
        - !type:ReagentThreshold
          min: 20 #please wait 3 minutes before using another stimpack, also goob edit
        damage:
          types:
            Poison: 1
      - !type:AdjustReagent
        conditions:
        - !type:ReagentThreshold
          reagent: ChloralHydrate
          min: 1
        reagent: ChloralHydrate
        amount: -10
      - !type:GenericStatusEffect
        key: Stun
        time: 3
        type: Remove
      - !type:GenericStatusEffect
        key: KnockedDown
        time: 1
        type: Remove
      - !type:GenericStatusEffect
        key: StaminaModifier
        component: StaminaModifier
        time: 3
        type: Add
      - !type:ModifyStatusEffect
        effectProto: StatusEffectForcedSleeping
        time: 3
        type: Remove
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentThreshold
          reagent: Haloperidol
          max: 0.01
        effectProto: StatusEffectDrowsiness
        time: 10
        type: Remove
      - !type:GenericStatusEffect # goob edit
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 4
      - !type:RemoveComponentEffect # goob edit
        component: DelayedKnockdown
        locale: reagent-effect-guidebook-remove-delayed-knockdown
      - !type:TakeStaminaDamage # goob edit
        amount: -10
        immediate: true
      - !type:SuppressPain
          amount: 1.2
          time: 30 # it accumulated 1.2*quantity and then exists for 30 seconds.
    Medicine:
      metabolismRate: 0.25 # Goobstation edit
      effects:
        - !type:ResetNarcolepsy
        - !type:SatiateHunger
          factor: 1
        - !type:SatiateThirst
          factor: 1
        - !type:HealthChange
          conditions:
          - !type:TotalDamage
            min: 70 # only heals when you're more dead than alive
          damage: # heals at the same rate as tricordrazine, doesn't heal poison because if you OD'd I'm not giving you a safety net
            groups:
              Burn: -1
              Brute: -1


