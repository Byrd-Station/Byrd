- type: entity
  categories: [ Spawner ]
  parent: MarkerBase
  id: SpawnPointPlayerCharacter
  name: ghost role spawn point
  suffix: player character
  components:
    - type: GhostRole
      name: Roleplay Ghost Role
      description: This is a custom event ghost role.
      rules: ghost-role-component-default-rules
    - type: GhostRoleCharacterSpawner
    - type: Sprite
      sprite: Markers/jobs.rsi
      layers:
        - state: green
        - sprite: Mobs/Species/Human/parts.rsi
          state: full

- type: entity
  parent: SpawnPointPlayerCharacter
  id: SpawnPointPlayerCharacterMindShield
  name: ghost role spawn point
  suffix: mindshielded, player character
  components:
  - type: GhostRoleCharacterSpawner
    addedComponents:
    - type: MindShield

- type: entity
  parent: SpawnPointPlayerCharacter
  id: SpawnPointPlayerCharacterTargetImmune
  name: ghost role spawn point
  suffix: mindshielded, KillObjectiveImmune, player character
  components:
  - type: GhostRoleCharacterSpawner
    addedComponents:
    - type: MindShield
    - type: AntagImmune
    #- type: TargetObjectiveImmune # Omu, we don't have this component.

- type: entity
  categories: [ HideSpawnMenu, Spawner ]
  parent: BaseAntagSpawner
  id: SpawnPointGhostAsakim
  components:
  - type: GhostRole
    name: ghost-role-information-asakim-name
    description: ghost-role-information-asakim-description
    rules: ghost-role-information-asakim-rules
    requirements: # keep in sync with the antag prototype
    - !type:OverallPlaytimeRequirement
      time: 172800 # 48 hours, same reasoning as SRN
