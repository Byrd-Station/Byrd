- type: entity
  parent: BaseHealingItem
  id: Oilpack
  name: oil pack
  suffix: Full
  description: Fit with a proprietary and disposable connector, oil can easily be injected to top off a bleeding IPC
  components:
  - type: Sprite
    sprite: _DV/Objects/Medical/Oilpack.rsi
    state: icon
  - type: Item
    sprite: _DV/Objects/Medical/Oilpack.rsi
    heldPrefix: icon
  - type: Healing
    damageContainers:
      - SiliconRadiation
    damage:
      types:
        Heat: -0 #lowers bloodloss damage, was .5 buffed due to Limb Damage Changes (Goobstation)
    modifyBloodLevel: -30 #used to restore 5% blood per use, now restores about 10% blood per use on standard Buffed due to Limb Damage Changes (Goobstation)
    healingBeginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: Bloodpack
    count: 15 #Was 10, Buffed due to limb damage changes (Goobstation)
  - type: StackPrice
    price: 10