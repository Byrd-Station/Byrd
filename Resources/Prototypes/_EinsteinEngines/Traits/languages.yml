# If you add a new trait, make sure to add the corresponding component to the whitelist in \Resources\Prototypes\Entities\Mobs\Player\clone.yml so it gets copied to clones correctly!
# Not sure if it's required, but I added the warning anyway.

- type: trait
  id: ForeignerLight
  name: trait-language-foreigner-light-name
  description: trait-language-foreigner-light-desc
  category: LanguageTraits
  cost: -1
  components:
  - type: ForeignerTrait
    cantUnderstand: false
    baseTranslator: TranslatorForeigner
  countsTowardsMaxTraits: false # Omustation - Don't count languages towards max traits
  requirements: # Omustation - Don't allow forigner and forigner light to be used at the same time
    - !type:TraitsRequirement
      traits:
        - Foreigner
      inverted: true

- type: trait
  id: Foreigner
  name: trait-language-foreigner-name
  description: trait-language-foreigner-desc
  category: LanguageTraits
  cost: -2
  components:
  - type: ForeignerTrait
    baseTranslator: TranslatorForeigner
  countsTowardsMaxTraits: false # Omustation - Don't count languages towards max traits

- type: trait
  id: SignLanguage
  name: trait-language-signlanguage-name
  description: trait-language-signlanguage-desc
  category: LanguageTraits
  cost: 1
  components:
  - type: LanguageSpeaker
  countsTowardsMaxTraits: false # Omustation - Don't count languages towards max traits
  languagesSpoken:
    - Sign
  languagesUnderstood:
    - Sign

