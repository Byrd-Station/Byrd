#plastitanium but blocks rads 100%

- type: entity
  id: PlasturaniumWindowDiagonalRadProof
  parent: PlastitaniumWindowDiagonal
  name: plasturanium window
  description: Don't smudge up the rads down there.
  suffix: Rad-Proof
  components:
  - type: RadiationBlocker
    resistance: 100
  - type: Sprite
    drawdepth: WallTops
    sprite: _Mono/Structures/Windows/plasturanium_window_diagonal.rsi
  - type: Icon
    sprite: _Mono/Structures/Windows/plasturanium_window_diagonal.rsi
    state: state0
