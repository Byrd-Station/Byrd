- type: entity
  parent: ClothingOuterStorageFoldableBase
  id: ClothingOuterCoatLabSeniorChemist
  name: senior chemist lab coat
  description: A suit that protects against minor chemical spills. Has orange sleeves, an orange waist trim, and two pink stripes on the shoulders.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/OuterClothing/Coats/labcoat_senior_chemist.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/OuterClothing/Coats/labcoat_senior_chemist.rsi
  - type: Armor
    modifiers:
      coefficients:
        Caustic: 0.75

- type: entity
  parent: [ClothingOuterStorageFoldableBaseOpened, ClothingOuterCoatLabSeniorChemist]
  id: ClothingOuterCoatLabSeniorChemistOpened
  name: senior chemist lab coat

- type: entity
  parent: [ClothingOuterStorageFoldableBase, AllowSuitStorageClothing, BaseSecurityContraband]
  id: ClothingOuterCoatLabBrigmedic
  name: corpsman's reminisced overcoat
  description: A labcoat from reminisced, peaceful days. It's been reinforced several times over.
  components:
  - type: Sprite
    sprite: _Starlight/Clothing/OuterClothing/Coats/brigmedic_overcoat.rsi
  - type: Clothing
    sprite: _Starlight/Clothing/OuterClothing/Coats/brigmedic_overcoat.rsi
  - type: Armor # Omu, gave them armor vest values.. Let them keep infect resist as a little treat
    coverage:
    - Chest
    - Groin
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.55
        Slash: 0.55
        Piercing: 0.55
        Heat: 0.7
  - type: ExplosionResistance
    damageCoefficient: 0.90
  - type: ModifyDelayedKnockdown # Goobstation
    delayDelta: 2
    knockdownTimeDelta: -2
  - type: StaminaResistance # Goobstation
    damageCoefficient: 0.7
  - type: ZombificationResistance
    zombificationResistanceCoefficient: 0.65

- type: entity
  parent: [ClothingOuterStorageFoldableBaseOpened, ClothingOuterCoatLabBrigmedic]
  id: ClothingOuterCoatLabBrigmedicOpened
  name: corpsman's reminisced overcoat

