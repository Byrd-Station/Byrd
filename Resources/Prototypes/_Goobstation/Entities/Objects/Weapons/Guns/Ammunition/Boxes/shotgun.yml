- type: entity
  parent: AmmoProviderShotgunShell
  id: BaseMagazineBoxShotgunHighCaliber
  abstract: true
  components:
  - type: BallisticAmmoProvider
    proto: null
    whitelist:
      tags:
      - ShellShotgun  #omu remove 8 gauge
  - type: Item
    size: Small

# Carpshot
- type: entity
  name: shell box (8 Gauge carpshot)
  parent: BaseMagazineBoxShotgunHighCaliber
  id: MagazineBoxShotgunHighCaliber
  components:
  - type: BallisticAmmoProvider
    proto: ShellShotgun #omu remove 8 gauge
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: lethal

