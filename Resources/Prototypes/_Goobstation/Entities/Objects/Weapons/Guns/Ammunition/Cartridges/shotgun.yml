## Slugs

# Slug
- type: entity
  id: ShellShotgunSlugHighCaliber
  name: shell (8 Gauge slug)    #never gonna appear
  parent: BaseShellShotgun
  categories: [ HideSpawnMenu ]
  components:
    - type: Tag
      tags:
        - Cartridge
        - ShellShotgun    #Omu kill 8 gauge
    - type: Sprite
      sprite: _Goobstation/Objects/Weapons/Guns/Ammunition/Cartridges/highcaliber-shell.rsi
      layers:
        - state: slug
          map: [ "enum.AmmoVisualLayers.Base" ]
    - type: CartridgeAmmo
      proto: PelletShotgunSlugHighCaliber
    - type: SpentAmmoVisuals
      state: "slug"

# Ensnaring
- type: entity
  id: ShellShotgunSlugEnsnaring
  name: cartridge (12 Gauge caliber ensnaring slug) #omu kill 8 gauge
  parent: ShellShotgunSlugHighCaliber
  components:
  - type: Tag
    tags:
      - Cartridge
      - ShellShotgun
  - type: CartridgeAmmo
    proto: BulletSlugEnsnaring
  - type: Sprite
    layers:
    - state: snare
      map: [ "enum.AmmoVisualLayers.Base" ]
  - type: SpentAmmoVisuals
    state: "snare"

# EMP
- type: entity
  id: ShellShotgunSlugEMP
  name: cartridge (12 Gauge caliber EMP slug) # Omu kill 8 gauge
  parent: ShellShotgunSlugHighCaliber
  components:
  - type: Tag
    tags:
     - Cartridge
     - ShellShotgun     # Omu kill 8 gauge
  - type: CartridgeAmmo
    proto: BulletSlugEMP
  - type: Sprite
    layers:
    - state: emp
      map: [ "enum.AmmoVisualLayers.Base" ]
  - type: SpentAmmoVisuals
    state: "emp"

